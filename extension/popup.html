<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      padding: 12px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #e8e8e8;
    }
    button.on {
      background: #4caf50;
      color: white;
      border-color: #43a047;
    }
    #status {
      margin-top: 8px;
      color: #888;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Billy Reader</h1>
  <button id="toggle">OFF</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
